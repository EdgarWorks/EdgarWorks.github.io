<style>
  :root {
    /* ── PALETA CLARA ───────────────────────────── */
    --bg:         #f6f7fb;
    --surface:    #ffffff;
    --surface2:   #f1f3f8;
    --border:     #e2e6ee;

    --accent:     #e8503a;  /* rojo */
    --accent2:    #b7791f;  /* ámbar */
    --accent3:    #2b7ecb;  /* azul */
    --green:      #1f9d5a;  /* verde */

    --text:       #3a4250;  /* cuerpo */
    --text-dim:   #7a8599;  /* secundario */
    --text-bright:#111827;  /* títulos */

    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;

    /* sombras sutiles para modo claro */
    --shadow-1: 0 1px 2px rgba(16, 24, 40, .06);
    --shadow-2: 0 6px 20px rgba(16, 24, 40, .08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.7;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY (suave en claro) ──────────── */
  body::before {
    content:'';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.02'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: .6;
  }

  /* ── SCROLLBAR ───────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  /* ── HEADER ──────────────────────────────────── */
  header {
    position: relative;
    padding: 80px 48px 60px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #ffffff 0%, #f7f9ff 100%);
  }

  header::after {
    content: 'LAPD CRIME DATA\A2020 – 2025';
    white-space: pre;
    position: absolute;
    right: -20px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--sans);
    font-size: 120px;
    font-weight: 800;
    line-height: .85;
    color: rgba(42, 65, 120, .06); /* marca de agua suave */
    pointer-events: none;
    user-select: none;
    text-align: right;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(232,80,58,.10);
    border: 1px solid rgba(232,80,58,.25);
    color: var(--accent);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 24px;
    box-shadow: var(--shadow-1);
  }

  .badge::before { content: '●'; font-size: 8px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.3 } }

  h1 {
    font-family: var(--sans);
    font-size: clamp(32px, 5vw, 58px);
    font-weight: 800;
    color: var(--text-bright);
    line-height: 1.05;
    max-width: 720px;
    margin-bottom: 20px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    max-width: 620px;
    color: var(--text-dim);
    font-size: 13px;
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .meta-row { display: flex; flex-wrap: wrap; gap: 24px; }

  .meta-item { display: flex; flex-direction: column; gap: 4px; }

  .meta-label {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .meta-value {
    font-size: 13px;
    color: var(--text-bright);
    font-weight: 600;
  }

  .meta-value.accent  { color: var(--accent); }
  .meta-value.accent2 { color: var(--accent2); }
  .meta-value.accent3 { color: var(--accent3); }

  /* ── STATS BAR ───────────────────────────────── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .stat-cell {
    padding: 28px 32px;
    border-right: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .stat-cell:last-child { border-right: none; }

  .stat-cell::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform .4s ease;
  }
  .stat-cell:hover::before { transform: scaleX(1); }

  .stat-num {
    font-family: var(--sans);
    font-size: 28px;
    font-weight: 800;
    color: var(--text-bright);
    line-height: 1;
    margin-bottom: 6px;
  }

  .stat-num span { color: var(--accent); }

  .stat-desc {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* ── LAYOUT ──────────────────────────────────── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 300px);
  }

  /* ── SIDEBAR ─────────────────────────────────── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 32px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    background: var(--surface);
  }

  .sidebar-section { padding: 0 24px; margin-bottom: 32px; }

  .sidebar-title {
    font-size: 9px;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
    font-size: 11px;
    transition: background .2s, color .2s, border-color .2s, transform .05s;
    text-decoration: none;
    border: 1px solid transparent;
  }

  .nav-item:hover {
    background: #f6f8fc;
    color: var(--text-bright);
    border-color: var(--border);
  }

  .nav-item.active {
    background: rgba(232,80,58,.08);
    color: var(--accent);
    border-color: rgba(232,80,58,.25);
  }

  .nav-num {
    font-size: 9px;
    color: var(--text-dim);
    min-width: 20px;
    font-weight: 600;
  }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    font-size: 9px;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    background: #fff;
  }

  .tag.sql     { border-color: rgba(43,126,203,.3);  color: var(--accent3); background: rgba(43,126,203,.06); }
  .tag.clean   { border-color: rgba(31,157,90,.3);   color: var(--green);   background: rgba(31,157,90,.06); }
  .tag.etl     { border-color: rgba(183,121,31,.3);  color: var(--accent2); background: rgba(183,121,31,.08); }
  .tag.tableau { border-color: rgba(232,80,58,.3);   color: var(--accent);  background: rgba(232,80,58,.08); }

  /* ── MAIN CONTENT ────────────────────────────── */
  .main {
    padding: 40px 48px;
    max-width: 100%;
    overflow: hidden;
  }

  /* ── SECTION ─────────────────────────────────── */
  .section { margin-bottom: 64px; padding-top: 16px; }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-num {
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: .08em;
  }

  .section-title {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 800;
    color: var(--text-bright);
  }

  .section-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── CODE BLOCK ──────────────────────────────── */
  .code-wrap {
    position: relative;
    margin: 20px 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
    box-shadow: var(--shadow-1);
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .code-title {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: .08em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .code-title::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }

  .code-badge {
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 999px;
    background: rgba(43,126,203,.12);
    color: var(--accent3);
    border: 1px solid rgba(43,126,203,.2);
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  .code-badge.green {
    background: rgba(31,157,90,.12);
    color: var(--green);
    border-color: rgba(31,157,90,.2);
  }

  .code-badge.orange {
    background: rgba(183,121,31,.12);
    color: var(--accent2);
    border-color: rgba(183,121,31,.2);
  }

  pre {
    margin: 0;
    padding: 20px;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.75;
    tab-size: 4;
    counter-reset: line;
    color: var(--text);
    background: var(--surface);
  }

  pre code { color: var(--text); }

  /* ── SYNTAX COLORS (legibles en claro) ───────── */
  .kw  { color: #7c3aed; font-weight: 600; }
  .fn  { color: var(--accent3); }
  .str { color: #047857; }
  .num { color: #b45309; }
  .cmt { color: #94a3b8; font-style: italic; }
  .cmt-section { color: #64748b; font-style: italic; font-weight: 600; }
  .tbl { color: var(--accent); font-weight: 600; }
  .col { color: #0ea5e9; }
  .op  { color: #0ea5e9; }
  .typ { color: #b45309; font-style: italic; }

  /* ── INFO CARD ───────────────────────────────── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin: 20px 0;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color .2s, box-shadow .2s, transform .05s;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow-1);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    opacity: .0;
    transition: opacity .2s;
  }

  .card:hover { border-color: rgba(232,80,58,.35); box-shadow: var(--shadow-2); }
  .card:hover::before { opacity: .9; }

  .card-icon { font-size: 22px; margin-bottom: 12px; display: block; }

  .card-title {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 800;
    color: var(--text-bright);
    margin-bottom: 6px;
  }

  .card-text {
    font-size: 11px;
    color: var(--text);
    line-height: 1.65;
  }

  /* ── PIPELINE ────────────────────────────────── */
  .pipeline {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    margin: 24px 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    background: var(--surface);
    box-shadow: var(--shadow-1);
  }

  .pipe-step {
    flex: 1;
    min-width: 120px;
    padding: 20px 18px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    position: relative;
    transition: background .2s;
  }

  .pipe-step:last-child { border-right: none; }
  .pipe-step:hover { background: var(--surface2); }

  .pipe-step::after {
    content: '→';
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 14px;
    z-index: 2;
  }

  .pipe-step:last-child::after { display: none; }

  .pipe-num {
    font-size: 9px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: .1em;
    margin-bottom: 6px;
  }

  .pipe-name {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 800;
    color: var(--text-bright);
    margin-bottom: 4px;
  }

  .pipe-desc {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* ── RESULT / WARN / INFO ────────────────────── */
  .result-box {
    background: rgba(31,157,90,.08);
    border: 1px solid rgba(31,157,90,.25);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 11px;
    color: var(--green);
    margin: 12px 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .result-box::before { content: '✓'; font-weight: 700; font-size: 13px; }

  .warn-box {
    background: rgba(183,121,31,.10);
    border: 1px solid rgba(183,121,31,.28);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 11px;
    color: var(--accent2);
    margin: 12px 0;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .warn-box::before { content: '⚠'; font-size: 13px; flex-shrink: 0; }

  .info-box {
    background: rgba(43,126,203,.10);
    border: 1px solid rgba(43,126,203,.28);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 11px;
    color: var(--accent3);
    margin: 12px 0;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .info-box::before { content: 'ℹ'; font-size: 13px; flex-shrink: 0; }

  /* ── TABLE ───────────────────────────────────── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 11px;
    background: var(--surface);
    box-shadow: var(--shadow-1);
    border-radius: 10px;
    overflow: hidden;
  }

  .data-table th {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    text-align: left;
    padding: 10px 14px;
    border: 1px solid var(--border);
  }

  .data-table td {
    padding: 9px 14px;
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    vertical-align: top;
  }

  .data-table tr:hover td { background: #fafbff; }

  td.accent  { color: var(--accent); font-weight: 600; }
  td.accent2 { color: var(--accent2); font-weight: 600; }
  td.accent3 { color: var(--accent3); font-weight: 600; }
  td.green   { color: var(--green);  font-weight: 600; }
  td.dim     { color: var(--text-dim); font-style: italic; }

  /* ── VIEWS DIAGRAM ───────────────────────────── */
  .views-diagram {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px;
    margin: 20px 0;
    font-size: 12px;
    box-shadow: var(--shadow-1);
  }

  .vd-center { display: flex; justify-content: center; margin-bottom: 32px; }

  .vd-box {
    background: var(--surface2);
    border: 2px solid var(--accent);
    border-radius: 10px;
    padding: 16px 28px;
    text-align: center;
  }

  .vd-box .label {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 800;
    color: var(--text-bright);
  }

  .vd-box .sub {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .vd-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }

  .vd-view {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    position: relative;
  }

  .vd-view::before {
    content: attr(data-type);
    position: absolute;
    top: -1px; right: 10px;
    font-size: 8px;
    padding: 2px 6px;
    border-radius: 0 0 6px 6px;
    text-transform: uppercase;
    letter-spacing: .08em;
  }

  .vd-view[data-type="1:1"]::before  { background: rgba(31,157,90,.18);  color: var(--green);   border: 1px solid rgba(31,157,90,.28); }
  .vd-view[data-type="1:N"]::before  { background: rgba(43,126,203,.18); color: var(--accent3); border: 1px solid rgba(43,126,203,.28); }
  .vd-view[data-type="N:M"]::before  { background: rgba(183,121,31,.18); color: var(--accent2); border: 1px solid rgba(183,121,31,.28); }

  .vd-view .name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .vd-view .rows {
    font-size: 10px;
    color: var(--accent2);
    font-weight: 600;
    margin-bottom: 4px;
  }

  .vd-view .desc {
    font-size: 10px;
    color: var(--text);
    line-height: 1.5;
  }

  /* ── FOOTER ──────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 20px;
    background: var(--surface);
  }

  .footer-left {
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 800;
    color: var(--text-bright);
  }

  .footer-left span { color: var(--accent); }

  .footer-right { font-size: 11px; color: var(--text-dim); }

  /* ── COPY BUTTON ─────────────────────────────── */
  .copy-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── RESPONSIVE ──────────────────────────────── */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
    header { padding: 48px 24px 40px; }
    .main  { padding: 32px 24px; }
    footer { padding: 32px 24px; }
    header::after { font-size: 60px; }
  }

  /* ── FADE IN ─────────────────────────────────── */
  @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  .section { animation: fadeUp .5s ease both; }
  .section:nth-child(2) { animation-delay: .08s; }
  .section:nth-child(3) { animation-delay: .16s; }
  .section:nth-child(4) { animation-delay: .24s; }
  .section:nth-child(5) { animation-delay: .32s; }

  /* Scrollbar para sidebar */
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: #d6dee6; border-radius: 6px; }
</style>
